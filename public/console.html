<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipee Console</title>
  <link rel="icon" type="image/x-icon" href="/newfav.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d14;
      --bg-card: #15151e;
      --bg-card-hover: #1c1c28;
      --border: #252538;
      --border-glow: #7c3aed;
      --text: #e4e4ed;
      --text-dim: #7e7e96;
      --text-muted: #4d4d64;
      --accent: #a78bfa;
      --accent-bright: #c4b5fd;
      --cta: #7c3aed;
      --cta-hover: #6d28d9;
      --green: #34d399;
      --blue: #60a5fa;
      --amber: #fbbf24;
      --red: #f87171;
      --bg-nav: rgba(13,13,20,0.9);
      --bg-code: #0f0f18;
      --font: 'DM Sans', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html.light {
      --bg: #f5f5fa;
      --bg-card: #ffffff;
      --bg-card-hover: #ededf4;
      --border: #dddde8;
      --border-glow: #7c3aed;
      --text: #1a1a2e;
      --text-dim: #5a5a72;
      --text-muted: #9090a8;
      --accent: #7c3aed;
      --accent-bright: #6d28d9;
      --cta: #7c3aed;
      --cta-hover: #6d28d9;
      --green: #059669;
      --blue: #2563eb;
      --amber: #d97706;
      --red: #ef4444;
      --bg-nav: rgba(245,245,250,0.92);
      --bg-code: #eeeef4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-nav);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-brand span { color: var(--accent); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-user {
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    .btn-sm {
      padding: 0.45rem 1rem;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-sm-primary {
      background: var(--cta);
      color: #fff;
    }
    .btn-sm-primary:hover { background: var(--cta-hover); }
    .btn-sm-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-sm-ghost:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* ===== MAIN ===== */
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    /* ===== LOGIN STATE ===== */
    .login-prompt {
      text-align: center;
      padding: 6rem 2rem;
    }
    .login-prompt h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .login-prompt p {
      color: var(--text-dim);
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    /* ===== SECTION HEADERS ===== */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .section-head h2 {
      font-size: 1.25rem;
      font-weight: 700;
    }
    .section-head .quota {
      font-size: 0.85rem;
      color: var(--text-dim);
      background: rgba(124,58,237,0.1);
      padding: 0.3rem 0.8rem;
      border-radius: 100px;
      border: 1px solid rgba(124,58,237,0.15);
    }

    /* ===== SITE LIST ===== */
    .site-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }
    .site-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      transition: border-color 0.2s;
    }
    .site-card:hover { border-color: var(--text-muted); }
    .site-info { flex: 1; min-width: 0; }
    .site-url {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    .site-url:hover { color: var(--accent-bright); }
    .site-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    .site-actions { display: flex; gap: 0.5rem; margin-left: 1rem; flex-shrink: 0; }
    .btn-delete {
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(248,113,113,0.2);
      background: rgba(248,113,113,0.08);
      color: var(--red);
      transition: all 0.2s;
    }
    .btn-delete:hover {
      background: rgba(248,113,113,0.15);
      border-color: rgba(248,113,113,0.4);
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: 10px;
      margin-bottom: 2.5rem;
    }

    /* ===== DEPLOY FORM ===== */
    .deploy-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
    }
    .deploy-section h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
    }
    .form-row {
      margin-bottom: 1.25rem;
    }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .slug-input-wrap {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .slug-input-wrap:focus-within { border-color: var(--accent); }
    .slug-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.6rem 0.75rem;
      outline: none;
    }
    .slug-suffix {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text-muted);
      padding-right: 0.75rem;
      white-space: nowrap;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1.25rem;
    }
    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(124,58,237,0.04);
    }
    .drop-zone-text {
      font-size: 0.9rem;
      color: var(--text-dim);
      line-height: 1.6;
    }
    .drop-zone-text strong { color: var(--text); }
    .file-input { display: none; }
    .selected-file {
      font-size: 0.8rem;
      color: var(--green);
      margin-top: 0.5rem;
      font-family: var(--mono);
    }

    /* Deploy button */
    .btn-deploy {
      width: 100%;
      padding: 0.75rem;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: var(--cta);
      color: #fff;
      transition: all 0.2s;
    }
    .btn-deploy:hover:not(:disabled) {
      background: var(--cta-hover);
      box-shadow: 0 0 30px rgba(124,58,237,0.3);
    }
    .btn-deploy:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Status messages */
    .deploy-status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }
    .deploy-status.success {
      display: block;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.2);
      color: var(--green);
    }
    .deploy-status.error {
      display: block;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.2);
      color: var(--red);
    }
    .deploy-status.loading {
      display: block;
      background: rgba(96,165,250,0.1);
      border: 1px solid rgba(96,165,250,0.2);
      color: var(--blue);
    }

    /* ===== CLI SECTION ===== */
    .cli-section {
      margin-top: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }
    .cli-section h4 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .cli-code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--green);
      word-break: break-all;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .btn-copy {
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .btn-copy:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* ===== LIGHT MODE OVERRIDES ===== */
    html.light .btn-sm-ghost {
      border-color: var(--border);
      color: var(--text-dim);
    }
    html.light .drop-zone:hover,
    html.light .drop-zone.dragover {
      background: rgba(124,58,237,0.06);
    }
    html.light .cli-code {
      background: var(--bg-card);
    }
    html.light .deploy-status.success {
      background: rgba(5,150,105,0.08);
      border-color: rgba(5,150,105,0.2);
    }
    html.light .deploy-status.error {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.2);
    }
    html.light .deploy-status.loading {
      background: rgba(37,99,235,0.08);
      border-color: rgba(37,99,235,0.2);
    }

    /* Theme toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-toggle:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }
    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    html.light .theme-toggle .icon-sun { display: block; }
    html.light .theme-toggle .icon-moon { display: none; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .navbar { padding: 0.75rem 1rem; }
      .main { padding: 1.5rem 1rem 3rem; }
      .site-card { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .site-actions { margin-left: 0; }
    }

    .hidden { display: none !important; }
  </style>
  <script>
    (function() {
      var s = localStorage.getItem('pipee-theme');
      if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="/" class="nav-brand">Pipee <span>Console</span></a>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="btn-sm btn-sm-primary hidden" id="btn-login" onclick="doLogin()">Login</button>
      <button class="btn-sm btn-sm-ghost hidden" id="btn-logout" onclick="doLogout()">Logout</button>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <!-- LOGIN PROMPT (shown when not logged in) -->
  <div class="main hidden" id="view-login">
    <div class="login-prompt">
      <h2>Deploy your site for free</h2>
      <p>Login to start deploying static websites to pipee.tw</p>
      <button class="btn-sm btn-sm-primary" style="padding: 0.65rem 2rem; font-size: 0.95rem;" onclick="doLogin()">Login to Continue</button>
    </div>
  </div>

  <!-- DASHBOARD (shown when logged in) -->
  <div class="main hidden" id="view-dashboard">
    <!-- Site list -->
    <div class="section-head">
      <h2>My Sites</h2>
      <span class="quota" id="quota-badge">0/3</span>
    </div>

    <div id="site-list" class="site-list"></div>
    <div id="empty-state" class="empty-state hidden">No sites yet. Deploy your first site below.</div>

    <!-- Deploy form -->
    <div class="deploy-section">
      <h3>Deploy New Site</h3>
      <div class="form-row">
        <label class="form-label">Slug</label>
        <div class="slug-input-wrap">
          <input type="text" class="slug-input" id="slug-input" placeholder="my-site" pattern="[a-z0-9][a-z0-9-]*[a-z0-9]" />
          <span class="slug-suffix">.pipee.tw</span>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Upload</label>
        <div class="drop-zone" id="drop-zone">
          <div class="drop-zone-text">
            <strong>Drag &amp; drop</strong> a ZIP file here<br>
            or click to select
          </div>
          <div class="selected-file hidden" id="selected-file"></div>
          <input type="file" class="file-input" id="file-input" accept=".zip,.tar.gz,.tgz" />
        </div>
      </div>
      <button class="btn-deploy" id="btn-deploy" onclick="doDeploy()" disabled>Deploy</button>
      <div class="deploy-status" id="deploy-status"></div>
    </div>

    <!-- CLI token -->
    <div class="cli-section">
      <h4>CLI Deploy</h4>
      <div class="cli-code">
        <span id="cli-token-display">npx pipee deploy --token ****</span>
        <button class="btn-copy" onclick="copyToken()">Copy</button>
      </div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.documentElement.classList.toggle('light');
      localStorage.setItem('pipee-theme',
        document.documentElement.classList.contains('light') ? 'light' : 'dark');
    }
  </script>
  <script>
    // ── HTML escaping ──
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // State
    let currentUser = null;
    let deployToken = null;
    let selectedFile = null;

    // Elements
    const $login = document.getElementById('view-login');
    const $dashboard = document.getElementById('view-dashboard');
    const $btnLogin = document.getElementById('btn-login');
    const $btnLogout = document.getElementById('btn-logout');
    const $navUser = document.getElementById('nav-user');
    const $siteList = document.getElementById('site-list');
    const $emptyState = document.getElementById('empty-state');
    const $quotaBadge = document.getElementById('quota-badge');
    const $slugInput = document.getElementById('slug-input');
    const $dropZone = document.getElementById('drop-zone');
    const $fileInput = document.getElementById('file-input');
    const $selectedFile = document.getElementById('selected-file');
    const $btnDeploy = document.getElementById('btn-deploy');
    const $deployStatus = document.getElementById('deploy-status');
    const $cliTokenDisplay = document.getElementById('cli-token-display');

    // ── Get current LetMeUse access token ──
    function getLmuToken() {
      if (window.letmeuse && window.letmeuse.getToken) {
        return window.letmeuse.getToken();
      }
      return localStorage.getItem('pipee_lmu_token');
    }

    // ── Init ──
    async function init() {
      deployToken = localStorage.getItem('pipee_deploy_token');

      // Load SDK first — it auto-restores sessions from localStorage
      await loadLetMeUseSDK();

      if (window.letmeuse) {
        setupAuthListener();

        // SDK auto-detects existing session; if user already logged in, onAuthChange fires
        // Give it a moment to restore session
        await new Promise(r => setTimeout(r, 300));

        if (window.letmeuse.user && deployToken) {
          // Already have SDK session + deploy token — verify with backend
          const token = getLmuToken();
          if (token) {
            try {
              const resp = await fetch('/api/auth/me', {
                headers: { 'Authorization': 'Bearer ' + token }
              });
              if (resp.ok) {
                const data = await resp.json();
                currentUser = data.user;
                showDashboard();
                loadSites();
                return;
              }
            } catch { /* fall through to login view */ }
          }
        } else if (window.letmeuse.user && !deployToken) {
          // Have SDK session but no deploy token — register with Pipee backend
          const token = getLmuToken();
          if (token) {
            const ok = await handlePipeeLogin(token);
            if (ok) return;
          }
        }
      }

      // Fallback: try with saved token (SDK failed to load)
      const savedToken = localStorage.getItem('pipee_lmu_token');
      if (deployToken && savedToken) {
        try {
          const resp = await fetch('/api/auth/me', {
            headers: { 'Authorization': 'Bearer ' + savedToken }
          });
          if (resp.ok) {
            const data = await resp.json();
            currentUser = data.user;
            showDashboard();
            loadSites();
            return;
          }
        } catch { /* fall through */ }
        localStorage.removeItem('pipee_deploy_token');
        localStorage.removeItem('pipee_lmu_token');
        deployToken = null;
      }

      showLogin();
    }

    // ── Load LetMeUse SDK dynamically ──
    function loadLetMeUseSDK() {
      return new Promise((resolve) => {
        if (window.letmeuse && window.letmeuse.ready) return resolve();
        const script = document.createElement('script');
        script.src = 'https://letmeuse.isnowfriend.com/letmeuse.js';
        script.setAttribute('data-app-id', 'app_LwmRGw');
        script.setAttribute('data-theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
        script.setAttribute('data-accent', '#a78bfa');
        script.setAttribute('data-locale', 'zh');
        script.setAttribute('data-mode', 'modal');
        script.onload = () => {
          const check = setInterval(() => {
            if (window.letmeuse && window.letmeuse.ready) {
              clearInterval(check);
              resolve();
            }
          }, 100);
          // Timeout after 5s
          setTimeout(() => { clearInterval(check); resolve(); }, 5000);
        };
        script.onerror = () => resolve();
        document.head.appendChild(script);
      });
    }

    // ── Set up auth change listener (once) ──
    let authListenerSet = false;
    function setupAuthListener() {
      if (authListenerSet) return;
      authListenerSet = true;
      window.letmeuse.onAuthChange(async (user) => {
        if (user) {
          const token = getLmuToken();
          if (token) await handlePipeeLogin(token);
        } else {
          doLogout();
        }
      });
    }

    // ── Register/login with Pipee backend using LetMeUse token ──
    async function handlePipeeLogin(token) {
      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        if (!resp.ok) {
          const err = await resp.json();
          alert(err.error || 'Login failed');
          showLogin();
          return false;
        }
        const data = await resp.json();
        currentUser = data.user;
        deployToken = data.deployToken;
        localStorage.setItem('pipee_deploy_token', deployToken);
        localStorage.setItem('pipee_lmu_token', token);
        showDashboard();
        loadSites();
        return true;
      } catch (err) {
        console.error('Pipee login error:', err);
        showLogin();
        return false;
      }
    }

    // ── Views ──
    function showLogin() {
      $login.classList.remove('hidden');
      $dashboard.classList.add('hidden');
      $btnLogin.classList.remove('hidden');
      $btnLogout.classList.add('hidden');
      $navUser.textContent = '';
    }

    function showDashboard() {
      $login.classList.add('hidden');
      $dashboard.classList.remove('hidden');
      $btnLogin.classList.add('hidden');
      $btnLogout.classList.remove('hidden');
      $navUser.textContent = currentUser.name || currentUser.email || 'User';
      $cliTokenDisplay.textContent = 'npx pipee deploy --token ' + (deployToken || '****');
    }

    // ── Auth ──
    async function doLogin() {
      if (!window.letmeuse) {
        await loadLetMeUseSDK();
        if (window.letmeuse) setupAuthListener();
      }
      if (!window.letmeuse) {
        alert('Login service unavailable. Please try again later.');
        return;
      }
      // Opens the LetMeUse login modal; onAuthChange fires on success
      window.letmeuse.login();
    }

    function doLogout() {
      currentUser = null;
      deployToken = null;
      localStorage.removeItem('pipee_deploy_token');
      localStorage.removeItem('pipee_lmu_token');
      if (window.letmeuse && window.letmeuse.logout) {
        window.letmeuse.logout();
      }
      showLogin();
    }

    // ── Sites ──
    async function loadSites() {
      const lmuToken = getLmuToken();
      if (!lmuToken) return;

      try {
        const resp = await fetch('/api/user/sites', {
          headers: { 'Authorization': 'Bearer ' + lmuToken },
        });
        if (!resp.ok) return;

        const data = await resp.json();
        renderSites(data.sites);
        $quotaBadge.textContent = `${data.quota.used}/${data.quota.max}`;
      } catch (err) {
        console.error('Load sites error:', err);
      }
    }

    function renderSites(sites) {
      if (sites.length === 0) {
        $siteList.innerHTML = '';
        $emptyState.classList.remove('hidden');
        return;
      }

      $emptyState.classList.add('hidden');
      $siteList.innerHTML = '';
      for (const s of sites) {
        const card = document.createElement('div');
        card.className = 'site-card';

        const info = document.createElement('div');
        info.className = 'site-info';

        const link = document.createElement('a');
        link.href = s.url;
        link.target = '_blank';
        link.className = 'site-url';
        link.textContent = s.url.replace('https://', '');

        const meta = document.createElement('div');
        meta.className = 'site-meta';
        meta.textContent = formatSize(s.size) + ' \u00B7 Updated ' + formatDate(s.updated_at);

        info.appendChild(link);
        info.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'site-actions';
        const delBtn = document.createElement('button');
        delBtn.className = 'btn-delete';
        delBtn.textContent = 'Delete';
        delBtn.addEventListener('click', () => deleteSite(s.slug));
        actions.appendChild(delBtn);

        card.appendChild(info);
        card.appendChild(actions);
        $siteList.appendChild(card);
      }
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diffMs = now - d;
      const diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 1) return 'just now';
      if (diffMin < 60) return diffMin + 'm ago';
      const diffH = Math.floor(diffMin / 60);
      if (diffH < 24) return diffH + 'h ago';
      const diffD = Math.floor(diffH / 24);
      if (diffD < 30) return diffD + 'd ago';
      return d.toLocaleDateString();
    }

    async function deleteSite(slug) {
      if (!confirm(`Delete ${slug}.pipee.tw? This cannot be undone.`)) return;

      const lmuToken = getLmuToken();
      try {
        const resp = await fetch('/api/user/sites/' + slug, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + lmuToken },
        });
        if (resp.ok) {
          loadSites();
        } else {
          const err = await resp.json();
          alert(err.error || 'Delete failed');
        }
      } catch (err) {
        alert('Delete failed: ' + err.message);
      }
    }

    // ── Deploy ──
    // Drag and drop
    $dropZone.addEventListener('click', () => $fileInput.click());
    $dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      $dropZone.classList.add('dragover');
    });
    $dropZone.addEventListener('dragleave', () => {
      $dropZone.classList.remove('dragover');
    });
    $dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      $dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        selectFile(e.dataTransfer.files[0]);
      }
    });
    $fileInput.addEventListener('change', () => {
      if ($fileInput.files.length > 0) {
        selectFile($fileInput.files[0]);
      }
    });

    function selectFile(file) {
      const validTypes = ['.zip', '.tar.gz', '.tgz'];
      const name = file.name.toLowerCase();
      if (!validTypes.some(ext => name.endsWith(ext))) {
        alert('Please upload a .zip or .tar.gz file');
        return;
      }
      selectedFile = file;
      $selectedFile.textContent = file.name + ' (' + formatSize(file.size) + ')';
      $selectedFile.classList.remove('hidden');
      updateDeployButton();
    }

    $slugInput.addEventListener('input', updateDeployButton);

    function updateDeployButton() {
      const slug = $slugInput.value.trim();
      $btnDeploy.disabled = !slug || !selectedFile;
    }

    async function doDeploy() {
      const slug = $slugInput.value.trim().toLowerCase();
      if (!slug || !selectedFile) return;

      const lmuToken = getLmuToken();
      if (!lmuToken) {
        showStatus('error', 'Not logged in. Please refresh and login again.');
        return;
      }

      $btnDeploy.disabled = true;
      $btnDeploy.textContent = 'Deploying...';
      showStatus('loading', 'Uploading and deploying...');

      try {
        const arrayBuffer = await selectedFile.arrayBuffer();

        const resp = await fetch('/api/user/deploy?slug=' + encodeURIComponent(slug), {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + lmuToken,
            'Content-Type': 'application/octet-stream',
          },
          body: arrayBuffer,
        });

        const data = await resp.json();

        if (resp.ok) {
          const safeUrl = escapeHtml(data.url);
          showStatus('success', 'Deployed! <a href="' + safeUrl + '" target="_blank" style="color:var(--green);font-weight:600">' + safeUrl + '</a>');
          selectedFile = null;
          $selectedFile.classList.add('hidden');
          $fileInput.value = '';
          $slugInput.value = '';
          loadSites();
        } else {
          showStatus('error', data.error || 'Deploy failed');
        }
      } catch (err) {
        showStatus('error', 'Deploy failed: ' + err.message);
      } finally {
        $btnDeploy.disabled = false;
        $btnDeploy.textContent = 'Deploy';
        updateDeployButton();
      }
    }

    function showStatus(type, msg) {
      $deployStatus.className = 'deploy-status ' + type;
      $deployStatus.innerHTML = msg;
    }

    // ── Copy token ──
    function copyToken() {
      if (!deployToken) return;
      const cmd = 'npx pipee deploy --token ' + deployToken;
      navigator.clipboard.writeText(cmd).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      });
    }

    // ── Start ──
    init();
  </script>
</body>
</html>
