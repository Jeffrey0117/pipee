<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="console.meta.title">Pipee Console</title>
  <link rel="icon" type="image/x-icon" href="/newfav.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="Deploy and manage your static sites on Pipee.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d14;
      --bg-card: #15151e;
      --bg-card-hover: #1c1c28;
      --border: #252538;
      --text: #e4e4ed;
      --text-dim: #9494ac;
      --text-muted: #6a6a82;
      --accent: #a78bfa;
      --accent-bright: #c4b5fd;
      --cta: #7c3aed;
      --cta-hover: #6d28d9;
      --green: #34d399;
      --blue: #60a5fa;
      --red: #f87171;
      --bg-nav: rgba(13,13,20,0.9);
      --font: 'DM Sans', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    html.light {
      --bg: #f5f5fa; --bg-card: #ffffff; --bg-card-hover: #ededf4;
      --border: #dddde8; --text: #1a1a2e; --text-dim: #5a5a72;
      --text-muted: #9090a8; --accent: #7c3aed; --accent-bright: #6d28d9;
      --cta: #7c3aed; --cta-hover: #6d28d9; --green: #059669;
      --blue: #2563eb; --red: #ef4444; --bg-nav: rgba(245,245,250,0.92);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .navbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--border); background: var(--bg-nav); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
    .nav-brand { font-size: 1.15rem; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
    .nav-brand span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-user { font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.5rem; }
    .plan-badge { font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .plan-badge.free { background: rgba(148,148,172,0.15); color: var(--text-muted); }
    .plan-badge.pro { background: rgba(124,58,237,0.15); color: var(--accent); border: 1px solid rgba(124,58,237,0.25); }
    .plan-badge.creator { background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(244,114,182,0.2)); color: var(--amber); border: 1px solid rgba(251,191,36,0.3); }
    .btn-sm { padding: 0.45rem 1rem; border-radius: 8px; font-family: var(--font); font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-sm-primary { background: var(--cta); color: #fff; }
    .btn-sm-primary:hover { background: var(--cta-hover); }
    .btn-sm-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-sm-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    .main { max-width: 800px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    /* Login */
    .login-prompt { text-align: center; padding: 6rem 2rem; }
    .login-prompt h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.75rem; }
    .login-prompt p { color: var(--text-dim); margin-bottom: 2rem; font-size: 1rem; }
    .auth-form { max-width: 360px; margin: 0 auto; }
    .auth-form input { width: 100%; padding: 0.7rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font); font-size: 0.9rem; outline: none; margin-bottom: 0.75rem; }
    .auth-form input:focus { border-color: var(--accent); }
    .auth-form .btn-auth { width: 100%; padding: 0.75rem; border-radius: 10px; font-family: var(--font); font-size: 0.95rem; font-weight: 700; cursor: pointer; border: none; background: var(--cta); color: #fff; transition: all 0.2s; margin-bottom: 0.75rem; }
    .auth-form .btn-auth:hover { background: var(--cta-hover); }
    .auth-toggle { font-size: 0.85rem; color: var(--text-dim); }
    .auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
    .auth-toggle a:hover { text-decoration: underline; }
    .auth-error { color: var(--red); font-size: 0.85rem; margin-bottom: 0.75rem; }

    /* Dashboard */
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .section-head h2 { font-size: 1.25rem; font-weight: 700; }
    .section-head .quota { font-size: 0.85rem; color: var(--text-dim); background: rgba(124,58,237,0.1); padding: 0.3rem 0.8rem; border-radius: 100px; border: 1px solid rgba(124,58,237,0.15); }

    .site-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; }
    .site-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; transition: border-color 0.2s; }
    .site-card:hover { border-color: var(--text-muted); }
    .site-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .site-card-left { display: flex; align-items: center; gap: 0.6rem; min-width: 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px rgba(52,211,153,0.5); animation: pulse-dot 2s ease-in-out infinite; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .site-url { font-size: 0.95rem; font-weight: 700; color: var(--text); text-decoration: none; word-break: break-all; }
    .site-url:hover { color: var(--accent); }
    .site-card-right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .btn-delete { padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.72rem; font-weight: 600; cursor: pointer; border: 1px solid rgba(248,113,113,0.15); background: transparent; color: var(--text-muted); transition: all 0.2s; }
    .btn-delete:hover { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--red); }
    .site-meta { font-size: 0.72rem; color: var(--text-muted); display: flex; gap: 0.75rem; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.9rem; background: var(--bg-card); border: 1px dashed var(--border); border-radius: 10px; margin-bottom: 2.5rem; }

    /* Deploy form */
    .deploy-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; }
    .deploy-section h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; }
    .form-row { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-dim); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .slug-input-wrap { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
    .slug-input-wrap:focus-within { border-color: var(--accent); }
    .slug-input { flex: 1; background: transparent; border: none; color: var(--text); font-family: var(--mono); font-size: 0.85rem; padding: 0.6rem 0.75rem; outline: none; }
    .slug-suffix { font-family: var(--mono); font-size: 0.82rem; color: var(--text-muted); padding-right: 0.75rem; white-space: nowrap; }

    .drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 2.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 1.25rem; }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(124,58,237,0.04); }
    .drop-zone-text { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; }
    .drop-zone-text strong { color: var(--text); }
    .file-input { display: none; }
    .selected-file { font-size: 0.8rem; color: var(--green); margin-top: 0.5rem; font-family: var(--mono); }

    .btn-deploy { width: 100%; padding: 0.75rem; border-radius: 10px; font-family: var(--font); font-size: 0.95rem; font-weight: 700; cursor: pointer; border: none; background: var(--cta); color: #fff; transition: all 0.2s; }
    .btn-deploy:hover:not(:disabled) { background: var(--cta-hover); box-shadow: 0 0 30px rgba(124,58,237,0.3); }
    .btn-deploy:disabled { opacity: 0.5; cursor: not-allowed; }

    .deploy-status { margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; display: none; }
    .deploy-status.success { display: block; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2); color: var(--green); }
    .deploy-status.error { display: block; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: var(--red); }
    .deploy-status.loading { display: block; background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.2); color: var(--blue); }

    /* Lang/theme toggles */
    .lang-toggle .lang-zh { display: none; }
    .lang-toggle, .theme-toggle { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.2s; font-size: 0.75rem; font-weight: 700; font-family: var(--font); }
    .lang-toggle:hover, .theme-toggle:hover { color: var(--text); border-color: var(--text-muted); }
    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    html.light .theme-toggle .icon-sun { display: block; }
    html.light .theme-toggle .icon-moon { display: none; }

    /* Git section */
    .site-git { margin-top: 0.75rem; padding-top: 0.65rem; border-top: 1px solid var(--border); }
    .git-info { font-size: 0.75rem; color: var(--text-muted); font-family: var(--mono); margin-bottom: 0.5rem; word-break: break-all; }
    .git-info .git-commit { color: var(--accent); font-weight: 600; }
    .git-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-git { padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: var(--font); transition: all 0.2s; }
    .btn-git:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }
    .btn-git:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-git-primary { background: rgba(124,58,237,0.1); border-color: rgba(124,58,237,0.2); color: var(--accent); }
    .btn-git-primary:hover:not(:disabled) { background: rgba(124,58,237,0.2); border-color: var(--accent); color: var(--accent-bright); }

    .clone-url-wrap { display: flex; align-items: center; gap: 0.5rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.6rem; margin-top: 0.4rem; margin-bottom: 0.5rem; }
    .clone-url-label { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; }
    .clone-url-text { flex: 1; font-size: 0.78rem; font-family: var(--mono); color: var(--accent); word-break: break-all; cursor: pointer; }
    .clone-url-text:hover { color: var(--accent-bright); }
    .btn-copy { padding: 0.2rem 0.5rem; border-radius: 5px; font-size: 0.68rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: var(--font); transition: all 0.2s; flex-shrink: 0; }
    .btn-copy:hover { color: var(--text); border-color: var(--accent); }
    .btn-copy.copied { color: var(--green); border-color: var(--green); }

    /* Git Dashboard */
    .git-dashboard { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
    .git-dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .git-dash-title { font-size: 0.85rem; font-weight: 700; color: var(--accent); }
    .commit-list { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }
    .commit-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 0.6rem 0.75rem; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); gap: 0.75rem; }
    .commit-info { flex: 1; min-width: 0; }
    .commit-sha { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); font-weight: 600; }
    .commit-msg { font-size: 0.8rem; color: var(--text); margin-top: 0.15rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .commit-meta { font-size: 0.68rem; color: var(--text-muted); margin-top: 0.15rem; }
    .commit-actions { display: flex; gap: 0.35rem; flex-shrink: 0; align-items: center; }
    .commit-actions .btn-git { font-size: 0.7rem; padding: 0.25rem 0.55rem; }
    .btn-load-more { display: block; width: 100%; padding: 0.5rem; border-radius: 8px; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1px dashed var(--border); background: transparent; color: var(--text-muted); font-family: var(--font); transition: all 0.2s; margin-top: 0.5rem; }
    .btn-load-more:hover { color: var(--text); border-color: var(--text-muted); }
    .diff-panel { margin-top: 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .diff-header { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    .diff-title { font-size: 0.78rem; font-family: var(--mono); color: var(--accent); font-weight: 600; }
    .diff-content { max-height: 400px; overflow: auto; padding: 0; margin: 0; font-family: var(--mono); font-size: 0.72rem; line-height: 1.6; }
    .diff-line { padding: 0 0.75rem; white-space: pre-wrap; word-break: break-all; }
    .diff-line.add { background: rgba(52,211,153,0.08); color: var(--green); }
    .diff-line.del { background: rgba(248,113,113,0.08); color: var(--red); }
    .diff-line.hdr { color: var(--blue); font-weight: 600; background: rgba(96,165,250,0.05); }
    .diff-line.file { color: var(--text); font-weight: 700; background: rgba(148,148,172,0.08); padding-top: 0.5rem; border-top: 1px solid var(--border); }

    /* AI Editor */
    .btn-ai { padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid rgba(124,58,237,0.3); background: rgba(124,58,237,0.08); color: var(--accent); font-family: var(--font); transition: all 0.2s; }
    .btn-ai:hover { background: rgba(124,58,237,0.18); border-color: var(--accent); color: var(--accent-bright); }
    .btn-ai .pro-badge { font-size: 0.6rem; background: var(--accent); color: #fff; padding: 1px 4px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }

    .ai-panel { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
    .ai-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .ai-panel-title { font-size: 0.85rem; font-weight: 700; color: var(--accent); }
    .ai-panel-actions { display: flex; gap: 0.5rem; }
    .ai-panel-actions button { padding: 0.2rem 0.5rem; border-radius: 5px; font-size: 0.68rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: var(--font); transition: all 0.2s; }
    .ai-panel-actions button:hover { color: var(--text); border-color: var(--text-muted); }
    .ai-quota { font-size: 0.68rem; color: var(--text-muted); margin-left: 0.5rem; }

    .ai-messages { max-height: 360px; overflow-y: auto; margin-bottom: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; padding-right: 4px; }
    .ai-msg { padding: 0.6rem 0.85rem; border-radius: 10px; font-size: 0.82rem; line-height: 1.55; max-width: 92%; word-break: break-word; }
    .ai-msg.user { background: rgba(124,58,237,0.12); color: var(--text); align-self: flex-end; border-bottom-right-radius: 3px; }
    .ai-msg.assistant { background: var(--bg); border: 1px solid var(--border); color: var(--text); align-self: flex-start; border-bottom-left-radius: 3px; }
    .ai-msg.assistant code { font-family: var(--mono); font-size: 0.78rem; background: rgba(124,58,237,0.08); padding: 1px 4px; border-radius: 3px; }
    .ai-msg.assistant pre { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem; margin: 0.4rem 0; overflow-x: auto; font-family: var(--mono); font-size: 0.75rem; }
    .ai-msg.system { font-size: 0.72rem; color: var(--green); align-self: center; font-style: italic; }
    .ai-msg.error { font-size: 0.72rem; color: var(--red); align-self: center; }

    .ai-input-row { display: flex; gap: 0.5rem; }
    .ai-input { flex: 1; padding: 0.6rem 0.85rem; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font); font-size: 0.85rem; outline: none; resize: none; min-height: 40px; max-height: 120px; }
    .ai-input:focus { border-color: var(--accent); }
    .ai-send { padding: 0.6rem 1.2rem; border-radius: 10px; font-family: var(--font); font-size: 0.82rem; font-weight: 700; cursor: pointer; border: none; background: var(--cta); color: #fff; transition: all 0.2s; flex-shrink: 0; }
    .ai-send:hover:not(:disabled) { background: var(--cta-hover); }
    .ai-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .ai-files-changed { font-size: 0.72rem; color: var(--green); margin-top: 0.25rem; font-family: var(--mono); }

    /* GitHub connection */
    .github-badge { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.72rem; font-weight: 700; padding: 3px 8px; border-radius: 5px; background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); margin-bottom: 0.5rem; }
    .github-setup { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.5rem; line-height: 1.5; }
    .btn-disconnect { padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid rgba(248,113,113,0.2); background: transparent; color: var(--text-muted); font-family: var(--font); transition: all 0.2s; }
    .btn-disconnect:hover { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--red); }
    .btn-github { padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: var(--font); transition: all 0.2s; }
    .btn-github:hover { color: var(--text); border-color: var(--accent); }
    .secret-text { font-family: var(--mono); font-size: 0.72rem; color: var(--text-muted); cursor: pointer; user-select: all; }
    .secret-text:hover { color: var(--text); }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .navbar { padding: 0.75rem 1rem; }
      .main { padding: 1.5rem 1rem 3rem; }
      .site-card-top { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .site-card-right { margin-left: 14px; }
    }
  </style>
  <script>
    (function() {
      var s = localStorage.getItem('pipee-theme');
      if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="nav-brand">Pipee <span>Console</span></a>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="btn-sm btn-sm-ghost hidden" id="btn-logout" onclick="doLogout()" data-i18n="console.logout">Logout</button>
      <button class="lang-toggle" onclick="toggleLang()"><span class="lang-en">中</span><span class="lang-zh">EN</span></button>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <!-- LOGIN / REGISTER -->
  <div class="main hidden" id="view-login">
    <div class="login-prompt">
      <h2 data-i18n="console.login.title">Deploy your site</h2>
      <p data-i18n="console.login.sub">Login or register to start deploying static websites</p>
      <div class="auth-form" id="auth-form">
        <div class="auth-error hidden" id="auth-error"></div>
        <input type="text" id="auth-username" placeholder="Username" autocomplete="username">
        <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
        <button class="btn-auth" id="btn-auth" onclick="doAuth()">Login</button>
        <div class="auth-toggle">
          <span id="auth-toggle-text" data-i18n="console.noAccount">No account?</span>

  <script>
    function escapeHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    // State
    let currentUser = null;
    let authToken = null;
    let selectedFile = null;
    let isRegisterMode = false;

    const $login = document.getElementById('view-login');
    const $dashboard = document.getElementById('view-dashboard');
    const $btnLogout = document.getElementById('btn-logout');
    const $navUser = document.getElementById('nav-user');
    const $siteList = document.getElementById('site-list');
    const $emptyState = document.getElementById('empty-state');
    const $quotaBadge = document.getElementById('quota-badge');
    const $slugInput = document.getElementById('slug-input');
    const $dropZone = document.getElementById('drop-zone');
    const $fileInput = document.getElementById('file-input');
    const $selectedFile = document.getElementById('selected-file');
    const $btnDeploy = document.getElementById('btn-deploy');
    const $deployStatus = document.getElementById('deploy-status');
    const $authError = document.getElementById('auth-error');

    // ── Auth ──
    function toggleAuthMode() {
      isRegisterMode = !isRegisterMode;
      document.getElementById('btn-auth').textContent = isRegisterMode ? t('console.register') : t('console.login');
      document.getElementById('auth-toggle-text').textContent = isRegisterMode ? t('console.hasAccount') : t('console.noAccount');
      document.getElementById('auth-toggle-link').textContent = isRegisterMode ? t('console.login') : t('console.register');
      $authError.classList.add('hidden');
    }

    async function doAuth() {
      const username = document.getElementById('auth-username').value.trim();
      const password = document.getElementById('auth-password').value;
      if (!username || !password) return;

      $authError.classList.add('hidden');
      const endpoint = isRegisterMode ? '/api/auth/register' : '/api/auth/login';

      try {
        const resp = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await resp.json();
        if (!resp.ok) {
          $authError.textContent = data.error || 'Error';
          $authError.classList.remove('hidden');
          return;
        }
        authToken = data.token;
        currentUser = data.user;
        localStorage.setItem('pipee_token', authToken);
        showDashboard();
        loadSites();
      } catch (err) {
        $authError.textContent = err.message;
        $authError.classList.remove('hidden');
      }
    }

    // Enter key to submit
    document.getElementById('auth-password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doAuth();
    });

    // ── Init ──
    async function init() {
      authToken = localStorage.getItem('pipee_token');
      if (authToken) {
        try {
          const resp = await fetch('/api/user/me', {
            headers: { 'Authorization': 'Bearer ' + authToken },
          });
          if (resp.ok) {
            const data = await resp.json();
            currentUser = data.user;
            showDashboard();
            loadSites();
            return;
          }
        } catch { /* fall through */ }
        localStorage.removeItem('pipee_token');
        authToken = null;
      }
      showLogin();
    }

    function showLogin() {
      $login.classList.remove('hidden');
      $dashboard.classList.add('hidden');
      $btnLogout.classList.add('hidden');
      $navUser.textContent = '';
    }

    function showDashboard() {
      $login.classList.add('hidden');
      $dashboard.classList.remove('hidden');
      $btnLogout.classList.remove('hidden');
      var planClass = currentUser.plan || 'free';
      var planLabel = currentUser.plan_label || currentUser.plan || 'Free';
      $navUser.innerHTML = escapeHtml(currentUser.username || 'User') +
        ' <span class="plan-badge ' + escapeHtml(planClass) + '">' + escapeHtml(planLabel) + '</span>';
      // Set slug suffix from current host
      var suffix = document.getElementById('slug-suffix');
      var host = location.host;
      suffix.textContent = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? ' (localhost)' : '.' + location.hostname;
    }

    function doLogout() {
      currentUser = null;
      authToken = null;
      localStorage.removeItem('pipee_token');
      showLogin();
    }

    // ── Sites ──
    async function loadSites() {
      if (!authToken) return;
      try {
        const resp = await fetch('/api/user/sites', {
          headers: { 'Authorization': 'Bearer ' + authToken },
        });
        if (!resp.ok) return;
        const data = await resp.json();
        renderSites(data.sites);
        $quotaBadge.textContent = data.quota.used + '/' + data.quota.max;
      } catch (err) { /* ignore */ }
    }

    function renderSites(sites) {
      if (sites.length === 0) {
        $siteList.innerHTML = '';
        $emptyState.classList.remove('hidden');
        return;
      }
      $emptyState.classList.add('hidden');
      $siteList.innerHTML = '';
      for (const s of sites) {
        const card = document.createElement('div');
        card.className = 'site-card';
        var top = document.createElement('div'); top.className = 'site-card-top';
        var left = document.createElement('div'); left.className = 'site-card-left';
        var dot = document.createElement('div'); dot.className = 'status-dot';
        var link = document.createElement('a'); link.href = s.url; link.target = '_blank'; link.className = 'site-url'; link.textContent = s.slug;
        left.appendChild(dot); left.appendChild(link);
        var right = document.createElement('div'); right.className = 'site-card-right';
        // AI Editor button
        if (currentUser && currentUser.ai_enabled) {
          var aiBtn = document.createElement('button'); aiBtn.className = 'btn-ai';
          aiBtn.innerHTML = t('console.ai.btn') + ' <span class="pro-badge">' + escapeHtml(currentUser.plan_label || 'PRO') + '</span>';
          aiBtn.addEventListener('click', function() { toggleAiPanel(s.slug, card); });
          right.appendChild(aiBtn);
        }
        // Git Dashboard button (Pro+ only)
        if (currentUser && currentUser.git_dashboard_enabled && s.repo_url) {
          var gitDashBtn = document.createElement('button'); gitDashBtn.className = 'btn-ai';
          gitDashBtn.innerHTML = t('console.git.dashboard.btn') + ' <span class="pro-badge">' + escapeHtml(currentUser.plan_label || 'PRO') + '</span>';
          gitDashBtn.addEventListener('click', function() { toggleGitDashboard(s.slug, card); });
          right.appendChild(gitDashBtn);
        }
        var delBtn = document.createElement('button'); delBtn.className = 'btn-delete'; delBtn.textContent = t('console.delete');
        delBtn.addEventListener('click', function() { deleteSite(s.slug); });
        right.appendChild(delBtn);
        top.appendChild(left); top.appendChild(right);
        var meta = document.createElement('div'); meta.className = 'site-meta';
        meta.innerHTML = '<span>' + escapeHtml(formatSize(s.size)) + '</span><span>' + escapeHtml(t('console.updated')) + ' ' + escapeHtml(formatDate(s.updated_at)) + '</span>';
        card.appendChild(top); card.appendChild(meta);

        // Git section
        var gitSection = document.createElement('div');
        gitSection.className = 'site-git';

        if (s.deploy_method === 'github') {
          // GitHub connected view
          var badge = document.createElement('div');
          badge.className = 'github-badge';
          badge.textContent = t('console.github.connected');
          gitSection.appendChild(badge);

          // Repo URL info
          var repoInfo = document.createElement('div');
          repoInfo.className = 'git-info';
          var repoInfoText = escapeHtml(s.repo_url || '');
          if (s.branch) repoInfoText += ' &mdash; ' + escapeHtml(s.branch);
          if (s.last_commit) repoInfoText += ' &mdash; <span class="git-commit">' + escapeHtml(s.last_commit.slice(0, 7)) + '</span>';
          repoInfo.innerHTML = repoInfoText;
          gitSection.appendChild(repoInfo);

          // Webhook URL
          var whUrlWrap = document.createElement('div');
          whUrlWrap.className = 'clone-url-wrap';
          var whUrlLabel = document.createElement('span');
          whUrlLabel.className = 'clone-url-label';
          whUrlLabel.textContent = t('console.github.webhookUrl');
          var whUrlText = document.createElement('span');
          whUrlText.className = 'clone-url-text';
          var webhookUrl = s.github_webhook_url || '';
          whUrlText.textContent = webhookUrl;
          whUrlText.title = webhookUrl;
          var whUrlCopy = document.createElement('button');
          whUrlCopy.className = 'btn-copy';
          whUrlCopy.textContent = 'Copy';
          (function(url, btn) {
            btn.addEventListener('click', function() { copyToClipboard(url, btn); });
            whUrlText.addEventListener('click', function() { copyToClipboard(url, btn); });
          })(webhookUrl, whUrlCopy);
          whUrlWrap.appendChild(whUrlLabel);
          whUrlWrap.appendChild(whUrlText);
          whUrlWrap.appendChild(whUrlCopy);
          gitSection.appendChild(whUrlWrap);

          // Webhook Secret
          var whSecWrap = document.createElement('div');
          whSecWrap.className = 'clone-url-wrap';
          var whSecLabel = document.createElement('span');
          whSecLabel.className = 'clone-url-label';
          whSecLabel.textContent = t('console.github.webhookSecret');
          var whSecText = document.createElement('span');
          whSecText.className = 'secret-text';
          var secret = (s.config && s.config.githubWebhookSecret) || '';
          whSecText.textContent = secret.slice(0, 8) + '...';
          whSecText.title = 'Click to show full secret';
          whSecText.addEventListener('click', function() {
            whSecText.textContent = whSecText.textContent.includes('...') ? secret : secret.slice(0, 8) + '...';
          });
          var whSecCopy = document.createElement('button');
          whSecCopy.className = 'btn-copy';
          whSecCopy.textContent = 'Copy';
          (function(sec, btn) {
            btn.addEventListener('click', function() { copyToClipboard(sec, btn); });
          })(secret, whSecCopy);
          whSecWrap.appendChild(whSecLabel);
          whSecWrap.appendChild(whSecText);
          whSecWrap.appendChild(whSecCopy);
          gitSection.appendChild(whSecWrap);

          // Setup hint
          var setupHint = document.createElement('div');
          setupHint.className = 'github-setup';
          setupHint.textContent = t('console.github.setup');
          gitSection.appendChild(setupHint);

          // Actions: Deploy + Disconnect
          var ghActions = document.createElement('div');
          ghActions.className = 'git-actions';
          ghActions.style.marginTop = '0.5rem';
          var ghDeployBtn = document.createElement('button');
          ghDeployBtn.className = 'btn-git btn-git-primary';
          ghDeployBtn.textContent = t('console.git.deploy');
          ghDeployBtn.addEventListener('click', function(e) { gitDeploy(s.slug, e); });
          var ghDisconnectBtn = document.createElement('button');
          ghDisconnectBtn.className = 'btn-disconnect';
          ghDisconnectBtn.textContent = t('console.github.disconnect');
          (function(slug) {
            ghDisconnectBtn.addEventListener('click', function() { disconnectGitHub(slug); });
          })(s.slug);
          ghActions.appendChild(ghDeployBtn);
          ghActions.appendChild(ghDisconnectBtn);
          gitSection.appendChild(ghActions);

        } else {
          var displayGitUrl = s.git_url || s.repo_url;
          if (displayGitUrl) {
            // Clone URL bar (prominent)
            var cloneWrap = document.createElement('div');
            cloneWrap.className = 'clone-url-wrap';
            var cloneLabel = document.createElement('span');
            cloneLabel.className = 'clone-url-label';
            cloneLabel.textContent = t('console.git.cloneHint');
            var cloneText = document.createElement('span');
            cloneText.className = 'clone-url-text';
            cloneText.textContent = displayGitUrl;
            cloneText.title = displayGitUrl;
            var copyBtn = document.createElement('button');
            copyBtn.className = 'btn-copy';
            copyBtn.textContent = 'Copy';
            var repoUrlForCopy = displayGitUrl;
            copyBtn.addEventListener('click', function() { copyCloneUrl(repoUrlForCopy, copyBtn); });
            cloneText.addEventListener('click', function() { copyCloneUrl(repoUrlForCopy, copyBtn); });
            cloneWrap.appendChild(cloneLabel);
            cloneWrap.appendChild(cloneText);
            cloneWrap.appendChild(copyBtn);
            gitSection.appendChild(cloneWrap);

            // Branch + commit info + deploy button
            var gitInfo = document.createElement('div');
            gitInfo.className = 'git-info';
            var infoText = '';
            if (s.branch) infoText += escapeHtml(s.branch);
            if (s.last_commit) infoText += ' &mdash; <span class="git-commit">' + escapeHtml(s.last_commit.slice(0, 7)) + '</span>';
            if (infoText) { gitInfo.innerHTML = infoText; gitSection.appendChild(gitInfo); }
            var gitActions = document.createElement('div');
            gitActions.className = 'git-actions';
            var deployBtn = document.createElement('button');
            deployBtn.className = 'btn-git btn-git-primary';
            deployBtn.textContent = t('console.git.deploy');
            deployBtn.addEventListener('click', function(e) { gitDeploy(s.slug, e); });
            gitActions.appendChild(deployBtn);
            gitSection.appendChild(gitActions);
          } else {
            var noRepoText = document.createElement('div');
            noRepoText.className = 'git-info';
            noRepoText.textContent = t('console.git.noRepo');
            gitSection.appendChild(noRepoText);
            var gitActions2 = document.createElement('div');
            gitActions2.className = 'git-actions';
            var linkBtn = document.createElement('button');
            linkBtn.className = 'btn-git';
            linkBtn.textContent = t('console.git.linkRepo');
            linkBtn.addEventListener('click', function() { showLinkRepo(s.slug); });
            var ghBtn = document.createElement('button');
            ghBtn.className = 'btn-github';
            ghBtn.textContent = t('console.github.connect');
            (function(slug) {
              ghBtn.addEventListener('click', function() { showConnectGitHub(slug); });
            })(s.slug);
            gitActions2.appendChild(linkBtn);
            gitActions2.appendChild(ghBtn);
            gitSection.appendChild(gitActions2);
          }
        }
        card.appendChild(gitSection);

        $siteList.appendChild(card);
      }
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function formatDate(iso) {
      var d = new Date(iso); var now = new Date(); var diffMs = now - d; var diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 1) return t('time.justNow');
      if (diffMin < 60) return diffMin + t('time.m');
      var diffH = Math.floor(diffMin / 60);
      if (diffH < 24) return diffH + t('time.h');
      var diffD = Math.floor(diffH / 24);
      if (diffD < 30) return diffD + t('time.d');
      return d.toLocaleDateString();
    }

    async function deleteSite(slug) {
      if (!confirm(t('console.delete.confirm').replace('{slug}', slug))) return;
      try {
        var resp = await fetch('/api/user/sites/' + slug, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + authToken },
        });
        if (resp.ok) loadSites();
        else { var err = await resp.json(); alert(err.error || 'Delete failed'); }
      } catch (err) { alert('Delete failed: ' + err.message); }
    }

    // ── Git ──
    function copyCloneUrl(url, btn) {
      navigator.clipboard.writeText('git clone ' + url).then(function() {
        btn.textContent = t('console.git.copied');
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      }).catch(function() {
        // Fallback: select text
        var ta = document.createElement('textarea');
        ta.value = 'git clone ' + url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = t('console.git.copied');
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    async function showLinkRepo(slug) {
      var repoUrl = prompt(t('console.git.promptUrl'));
      if (!repoUrl) return;

      var branch = prompt(t('console.git.promptBranch'), 'main') || 'main';

      try {
        var res = await fetch('/api/user/sites/' + encodeURIComponent(slug) + '/link-repo', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + authToken,
          },
          body: JSON.stringify({ repo_url: repoUrl, branch: branch }),
        });

        var data = await res.json();
        if (!res.ok) {
          alert(data.error || t('console.git.linkFailed'));
          return;
        }

        loadSites();
      } catch (err) {
        alert(t('console.git.linkFailed') + ': ' + err.message);
      }
    }

    async function gitDeploy(slug, e) {
      if (!confirm(t('console.git.deployConfirm'))) return;

      var btn = e && e.target;
      if (btn) {
        btn.disabled = true;
        btn.textContent = t('console.git.deploying');
      }

      try {
        var res = await fetch('/api/user/sites/' + encodeURIComponent(slug) + '/git-deploy', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + authToken,
          },
        });

        var data = await res.json();
        if (!res.ok) {
          alert(data.error || t('console.git.deployFailed'));
          return;
        }

        alert(t('console.git.deployed') + ' ' + data.commit);
        loadSites();
      } catch (err) {
        alert(t('console.git.deployFailed') + ': ' + err.message);
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = t('console.git.deploy');
        }
      }
    }

    // ── GitHub Connect ──
    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = t('console.git.copied');
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = t('console.git.copied');
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    async function showConnectGitHub(slug) {
      var repoUrl = prompt(t('console.github.promptUrl'));
      if (!repoUrl) return;

      var branch = prompt(t('console.github.promptBranch'), 'main') || 'main';

      try {
        var res = await fetch('/api/user/sites/' + encodeURIComponent(slug) + '/link-github', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + authToken,
          },

        });

        if (!res.ok) {
          alert(data.error || t('console.github.connectFailed'));

        }

      } catch (err) {
        alert(t('console.github.connectFailed') + ': ' + err.message);
      }

    async function disconnectGitHub(slug) {
      if (!confirm(t('console.github.disconnect.confirm').replace('{slug}', slug))) return;

      try {
        var res = await fetch('/api/user/sites/' + encodeURIComponent(slug) + '/link-github', {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + authToken },
        });

        if (res.ok) {
          loadSites();

          var data = await res.json();

    // ── Deploy ──
    $dropZone.addEventListener('click', function() { $fileInput.click(); });
    $dropZone.addEventListener('dragover', function(e) { e.preventDefault(); $dropZone.classList.add('dragover'); });
    $dropZone.addEventListener('dragleave', function() { $dropZone.classList.remove('dragover'); });
    $dropZone.addEventListener('drop', function(e) {
      e.preventDefault(); $dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) selectFile(e.dataTransfer.files[0]);
    });
    $fileInput.addEventListener('change', function() { if ($fileInput.files.length > 0) selectFile($fileInput.files[0]); });

    function selectFile(file) {
      if (!file.name.toLowerCase().endsWith('.zip')) {
        alert(t('console.upload.invalidType')); return;
      }
      selectedFile = file;
      $selectedFile.textContent = file.name + ' (' + formatSize(file.size) + ')';
      $selectedFile.classList.remove('hidden');
      updateDeployButton();
    }

    $slugInput.addEventListener('input', updateDeployButton);
    function updateDeployButton() {
      $btnDeploy.disabled = !$slugInput.value.trim() || !selectedFile;
    }

    async function doDeploy() {
      var slug = $slugInput.value.trim().toLowerCase();
      if (!slug || !selectedFile) return;
      if (!authToken) { showStatus('error', 'Not logged in'); return; }

      // First create the site
      $btnDeploy.disabled = true;
      $btnDeploy.textContent = t('console.deploy.deploying');
      showStatus('loading', t('console.deploy.uploading'));

      try {
        // Create site (ignore 409 if already exists)
        var createResp = await fetch('/api/user/sites', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug: slug }),
        });
        var createData = null;
        try { createData = await createResp.json(); } catch { /* ignore */ }

        // Deploy
        var arrayBuffer = await selectedFile.arrayBuffer();
        var resp = await fetch('/api/user/sites/' + encodeURIComponent(slug) + '/deploy', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/octet-stream' },
          body: arrayBuffer,
        });
        var data = await resp.json();
        if (resp.ok) {
          var safeUrl = escapeHtml(data.url);
          var msg = t('console.deploy.success') + ' <a href="' + safeUrl + '" target="_blank" style="color:var(--green);font-weight:600">' + safeUrl + '</a>';
          if (createData && createData.git_url) {
            msg += '<br><span style="font-size:0.85rem;color:var(--text-dim)">' + escapeHtml(t('console.git.cloneHint')) + '</span> <code style="font-family:var(--mono);color:var(--accent);font-size:0.82rem">git clone ' + escapeHtml(createData.git_url) + '</code>';
          }
          showStatus('success', msg);
          selectedFile = null;
          $selectedFile.classList.add('hidden');
          $fileInput.value = '';
          $slugInput.value = '';
          loadSites();
        } else {
          showStatus('error', data.error || t('console.deploy.failed'));
        }
      } catch (err) {
        showStatus('error', t('console.deploy.failed') + ': ' + err.message);
      } finally {
        $btnDeploy.disabled = false;
        $btnDeploy.textContent = t('console.deploy.btn');
        updateDeployButton();
      }
    }

    function showStatus(type, msg) {
      $deployStatus.className = 'deploy-status ' + type;
      $deployStatus.innerHTML = msg;
    }

    // ── AI Editor ──
    var aiOpenSlug = null;

    function toggleAiPanel(slug, card) {
      // Close existing panel if open
      var existing = card.querySelector('.ai-panel');
      if (existing) {
        existing.remove();
        if (aiOpenSlug === slug) { aiOpenSlug = null; return; }
      }

      aiOpenSlug = slug;

      var panel = document.createElement('div');
      panel.className = 'ai-panel';
      panel.innerHTML =
        '<div class="ai-panel-header">' +
          '<div><span class="ai-panel-title">' + escapeHtml(t('console.ai.title')) + '</span><span class="ai-quota" id="ai-quota-' + slug + '"></span></div>' +
          '<div class="ai-panel-actions">' +
            '<button onclick="clearAiSession(\'' + slug + '\', this)">' + escapeHtml(t('console.ai.clear')) + '</button>' +
            '<button onclick="closeAiPanel(this)">' + escapeHtml(t('console.ai.close')) + '</button>' +
          '</div>' +
        '</div>' +
        '<div class="ai-messages" id="ai-msgs-' + slug + '">' +
          '<div class="ai-msg assistant">' + escapeHtml(t('console.ai.welcome')) + '</div>' +
        '</div>' +
        '<div class="ai-input-row">' +
          '<textarea class="ai-input" id="ai-input-' + slug + '" placeholder="' + escapeHtml(t('console.ai.placeholder')) + '" rows="1" onkeydown="aiInputKeydown(event, \'' + slug + '\')"></textarea>' +
          '<button class="ai-send" id="ai-send-' + slug + '" onclick="sendAiMessage(\'' + slug + '\')">' + escapeHtml(t('console.ai.send')) + '</button>' +
        '</div>';
      card.appendChild(panel);

      // Auto-resize textarea
      var textarea = document.getElementById('ai-input-' + slug);
      textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });
      textarea.focus();
    }

    function closeAiPanel(btn) {
      var panel = btn.closest('.ai-panel');
      if (panel) panel.remove();
      aiOpenSlug = null;
    }

    function aiInputKeydown(e, slug) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendAiMessage(slug);
      }
    }

    async function sendAiMessage(slug) {
      var input = document.getElementById('ai-input-' + slug);
      var sendBtn = document.getElementById('ai-send-' + slug);
      var msgsDiv = document.getElementById('ai-msgs-' + slug);
      if (!input || !sendBtn || !msgsDiv) return;

      var message = input.value.trim();
      if (!message) return;

      // Add user message to UI
      var userMsg = document.createElement('div');
      userMsg.className = 'ai-msg user';
      userMsg.textContent = message;
      msgsDiv.appendChild(userMsg);

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      sendBtn.textContent = t('console.ai.sending');

      // Scroll to bottom
      msgsDiv.scrollTop = msgsDiv.scrollHeight;

      try {
        var resp = await fetch('/api/user/sites/' + encodeURIComponent(slug) + '/ai-chat', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message }),
        });
        var data = await resp.json();

        if (!resp.ok) {
          var errMsg = document.createElement('div');
          errMsg.className = 'ai-msg error';
          errMsg.textContent = data.error || t('console.ai.error');
          msgsDiv.appendChild(errMsg);
        } else {
          // Assistant reply
          var assistantMsg = document.createElement('div');
          assistantMsg.className = 'ai-msg assistant';
          assistantMsg.innerHTML = formatAiReply(data.reply);
          msgsDiv.appendChild(assistantMsg);

          // Files changed
          if (data.filesChanged && data.filesChanged.length > 0) {
            var filesMsg = document.createElement('div');
            filesMsg.className = 'ai-msg system';
            filesMsg.textContent = t('console.ai.filesChanged') + ' ' + data.filesChanged.map(function(f) { return f.path; }).join(', ');
            msgsDiv.appendChild(filesMsg);
          }

          // Update quota
          if (data.quota) {
            var quotaEl = document.getElementById('ai-quota-' + slug);
            if (quotaEl) quotaEl.textContent = data.quota.used + '/' + data.quota.limit + ' ' + t('console.ai.quota');
          }
        }
      } catch (err) {
        var errMsg2 = document.createElement('div');
        errMsg2.className = 'ai-msg error';
        errMsg2.textContent = t('console.ai.error') + ': ' + err.message;
        msgsDiv.appendChild(errMsg2);
      }

      sendBtn.disabled = false;
      sendBtn.textContent = t('console.ai.send');
      msgsDiv.scrollTop = msgsDiv.scrollHeight;
    }

    async function clearAiSession(slug, btn) {
      try {
        await fetch('/api/user/sites/' + encodeURIComponent(slug) + '/ai-chat', {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + authToken },
        });
      } catch { /* ignore */ }

      var msgsDiv = document.getElementById('ai-msgs-' + slug);
      if (msgsDiv) {
        msgsDiv.innerHTML = '<div class="ai-msg assistant">' + escapeHtml(t('console.ai.welcome')) + '</div>';
      }
    }

    function formatAiReply(text) {
      if (!text) return '';
      // Simple markdown-like formatting
      var html = escapeHtml(text);
      // Code blocks: ```...```
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
        return '<pre>' + code + '</pre>';
      });
      // Inline code: `...`
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Bold: **...**
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // Newlines
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    // ── Git Dashboard ──
    var gitDashOpenSlug = null;

    function toggleGitDashboard(slug, card) {
      var existing = card.querySelector('.git-dashboard');
      if (existing) {
        existing.remove();
        if (gitDashOpenSlug === slug) { gitDashOpenSlug = null; return; }
      }
      gitDashOpenSlug = slug;

      var panel = document.createElement('div');
      panel.className = 'git-dashboard';
      panel.innerHTML =
        '<div class="git-dash-header">' +
          '<span class="git-dash-title">' + escapeHtml(t('console.git.dashboard.title')) + '</span>' +
          '<button class="btn-git" onclick="closeGitDashboard(this)">' + escapeHtml(t('console.git.diff.close')) + '</button>' +
        '</div>' +
        '<div class="commit-list" id="git-commits-' + slug + '">' +
          '<div style="text-align:center;padding:1rem;color:var(--text-muted);font-size:0.82rem">' + escapeHtml(t('console.git.loading')) + '</div>' +
        '</div>' +
        '<div id="git-diff-' + slug + '"></div>';
      card.appendChild(panel);
      loadCommits(slug, 1);
    }

    function closeGitDashboard(btn) {
      var panel = btn.closest('.git-dashboard');
      if (panel) panel.remove();
      gitDashOpenSlug = null;
    }

    async function loadCommits(slug, page) {
      var container = document.getElementById('git-commits-' + slug);
      if (!container) return;

      if (page === 1) {
        container.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--text-muted);font-size:0.82rem">' + escapeHtml(t('console.git.loading')) + '</div>';
      }

      try {
        var resp = await fetch('/api/user/sites/' + encodeURIComponent(slug) + '/commits?page=' + page + '&limit=20', {
          headers: { 'Authorization': 'Bearer ' + authToken },
        });
        var data = await resp.json();

        if (!resp.ok) {
          container.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--red);font-size:0.82rem">' + escapeHtml(data.error || 'Error') + '</div>';
          return;
        }

        if (page === 1) container.innerHTML = '';

        if (data.commits.length === 0 && page === 1) {
          container.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--text-muted);font-size:0.82rem">' + escapeHtml(t('console.git.commits.empty')) + '</div>';
          return;
        }

        for (var i = 0; i < data.commits.length; i++) {
          var c = data.commits[i];
          var item = document.createElement('div');
          item.className = 'commit-item';

          var info = document.createElement('div');
          info.className = 'commit-info';
          var shaSpan = document.createElement('span');
          shaSpan.className = 'commit-sha';
          shaSpan.textContent = c.sha.slice(0, 7);
          var msgDiv = document.createElement('div');
          msgDiv.className = 'commit-msg';
          msgDiv.textContent = c.message.split('\n')[0];
          msgDiv.title = c.message;
          var metaDiv = document.createElement('div');
          metaDiv.className = 'commit-meta';
          metaDiv.textContent = c.author + ' \u00b7 ' + formatDate(c.date);
          info.appendChild(shaSpan);
          info.appendChild(msgDiv);
          info.appendChild(metaDiv);

          var actions = document.createElement('div');
          actions.className = 'commit-actions';
          var diffBtn = document.createElement('button');
          diffBtn.className = 'btn-git';
          diffBtn.textContent = t('console.git.diff');
          diffBtn.dataset.sha = c.sha;
          diffBtn.dataset.slug = slug;
          diffBtn.addEventListener('click', function() { loadDiff(this.dataset.slug, this.dataset.sha); });
          var rollBtn = document.createElement('button');
          rollBtn.className = 'btn-git';
          rollBtn.textContent = t('console.git.rollback');
          rollBtn.dataset.sha = c.sha;
          rollBtn.dataset.slug = slug;
          rollBtn.addEventListener('click', function() { doRollback(this.dataset.slug, this.dataset.sha, this); });
          actions.appendChild(diffBtn);
          actions.appendChild(rollBtn);

          item.appendChild(info);
          item.appendChild(actions);
          container.appendChild(item);
        }

        // Load more button
        var oldMoreBtn = container.parentElement.querySelector('.btn-load-more');
        if (oldMoreBtn) oldMoreBtn.remove();

        if (data.commits.length === data.limit && (page * data.limit) < data.total) {
          var loadMoreBtn = document.createElement('button');
          loadMoreBtn.className = 'btn-load-more';
          loadMoreBtn.textContent = t('console.git.loadMore');
          loadMoreBtn.dataset.slug = slug;
          loadMoreBtn.dataset.page = page + 1;
          loadMoreBtn.addEventListener('click', function() {
            var s = this.dataset.slug;
            var p = parseInt(this.dataset.page, 10);
            this.remove();
            loadCommits(s, p);
          });
          container.after(loadMoreBtn);
        }
      } catch (err) {
        if (page === 1) {
          container.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--red);font-size:0.82rem">' + escapeHtml(err.message) + '</div>';
        }
      }
    }

    async function loadDiff(slug, sha) {
      var diffContainer = document.getElementById('git-diff-' + slug);
      if (!diffContainer) return;

      if (diffContainer.dataset.sha === sha) {
        diffContainer.innerHTML = '';
        diffContainer.dataset.sha = '';
        return;
      }

      diffContainer.dataset.sha = sha;
      diffContainer.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--text-muted);font-size:0.82rem">' + escapeHtml(t('console.git.loading')) + '</div>';

      try {
        var resp = await fetch('/api/user/sites/' + encodeURIComponent(slug) + '/commits/' + sha + '/diff', {
          headers: { 'Authorization': 'Bearer ' + authToken },
        });
        var data = await resp.json();

        if (!resp.ok) {
          diffContainer.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--red);font-size:0.82rem">' + escapeHtml(data.error || 'Error') + '</div>';
          return;
        }

        var panel = document.createElement('div');
        panel.className = 'diff-panel';
        var header = document.createElement('div');
        header.className = 'diff-header';
        header.innerHTML = '<span class="diff-title">' + escapeHtml(sha.slice(0, 7)) + '</span><button class="btn-git" onclick="closeDiffPanel(this,\'' + slug + '\')">' + escapeHtml(t('console.git.diff.close')) + '</button>';
        var content = document.createElement('div');
        content.className = 'diff-content';
        content.innerHTML = renderDiffText(data.diff);
        panel.appendChild(header);
        panel.appendChild(content);
        diffContainer.innerHTML = '';
        diffContainer.appendChild(panel);
      } catch (err) {
        diffContainer.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--red);font-size:0.82rem">' + escapeHtml(err.message) + '</div>';
      }
    }

    function closeDiffPanel(btn, slug) {
      var panel = btn.closest('.diff-panel');
      if (panel) panel.remove();
      var diffContainer = document.getElementById('git-diff-' + slug);
      if (diffContainer) diffContainer.dataset.sha = '';
    }

    function renderDiffText(diffText) {
      if (!diffText) return '<div class="diff-line" style="color:var(--text-muted)">No changes</div>';
      var lines = diffText.split('\n');
      var html = '';
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        var cls = '';
        if (line.startsWith('diff --git')) cls = 'file';
        else if (line.startsWith('@@')) cls = 'hdr';
        else if (line.startsWith('+') && !line.startsWith('+++')) cls = 'add';
        else if (line.startsWith('-') && !line.startsWith('---')) cls = 'del';
        html += '<div class="diff-line ' + cls + '">' + escapeHtml(line) + '</div>';
      }
      return html;
    }

    async function doRollback(slug, sha, btn) {
      if (!confirm(t('console.git.rollback.confirm').replace('{sha}', sha.slice(0, 7)))) return;
      btn.disabled = true;
      var origText = btn.textContent;
      btn.textContent = t('console.git.loading');

      try {
        var resp = await fetch('/api/user/sites/' + encodeURIComponent(slug) + '/rollback', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ sha: sha }),
        });
        var data = await resp.json();

        if (!resp.ok) {
          alert(data.error || t('console.git.rollback.failed'));
          return;
        }

        alert(t('console.git.rollback.success') + ' ' + data.commit);
        loadSites();
      } catch (err) {
        alert(t('console.git.rollback.failed') + ': ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = origText;
      }
    }

    init();
  </script>
